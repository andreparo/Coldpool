# mypy.ini

[mypy]
# Target Python version used for type checking semantics.
# This should match the Python version you run in production/dev.
python_version = 3.12

# Ignore imports that mypy cannot resolve.
# Useful for third-party packages without stubs or modules not available in the environment.
# Tradeoff: those imports become much less checked and often behave like Any.
ignore_missing_imports = True

# Do not report errors for imports coming from untyped packages.
# Example:
#   from some_old_library import helper
# If the library has no typing info, mypy will not complain here.
disable_error_code = import-untyped

# Do not deeply analyze imported modules; treat them in a shallow/skipped way.
# This makes mypy faster and quieter, but reduces cross-module checking.
# Good for incremental adoption.
follow_imports = skip

# Warn if there are invalid or unused mypy config options.
# Helps catch typos in this file.
warn_unused_configs = True

# Exclude these paths from recursive mypy discovery.
# Useful for frontend artifacts, builds, huge dependency folders, and CI scripts.
exclude = (^|/)(ci|node_modules|react_frontend_page|dist|build)(/|$)

# Require every function and method to have full type annotations.
# Example rejected:
#   def build(x):
#       return x
disallow_untyped_defs = True

# Reject partially annotated function signatures.
# Example rejected:
#   def build(x: int):
#       return x
# because the return type is missing.
disallow_incomplete_defs = True

# Require module-level/global variables to have explicit types.
# Example preferred:
#   CACHE: dict[str, int] = {}
allow_untyped_globals = False

# Allow a variable to be reassigned to a new value later.
# Convenient in real code, though too much reassignment can reduce clarity.
# Example allowed:
#   value: str | None = None
#   value = "ready"
allow_redefinition = True

# Warn when a typed function returns a value inferred as Any.
# This is currently disabled to reduce noise.
# Example problem when enabled:
#   def build() -> str:
#       return some_untyped_function()
warn_return_any = False

# Type-check the bodies of functions even if they are untyped.
# This gives useful checking during gradual adoption.
# Example:
#   def build(x):
#       return x + "a"
# mypy can still inspect the body.
check_untyped_defs = True

# Forbid typed functions from calling untyped functions.
# Example rejected:
#   def helper(x):
#       return x
#
#   def build(x: int) -> int:
#       return helper(x)
disallow_untyped_calls = True

# Warn when a '# type: ignore' comment is no longer needed.
# Helps keep the codebase clean as types improve over time.
warn_unused_ignores = True

# Require optional types to be explicit.
# Example rejected:
#   def build(name: str = None) -> None: ...
# Preferred:
#   def build(name: str | None = None) -> None: ...
no_implicit_optional = True

# Enable full None/Optional safety checking.
# Example rejected:
#   def upper_name(name: str | None) -> str:
#       return name.upper()
# because name could be None.
strict_optional = True

# Reject suspicious equality checks between incompatible types.
# Example rejected:
#   value: int = 3
#   if value == "3":
#       ...
strict_equality = True

# Require generic types to always specify type parameters.
# Example rejected:
#   def build(items: list) -> dict:
#       return {}
# Preferred:
#   def build(items: list[str]) -> dict[str, int]:
#       return {}
disallow_any_generics = True